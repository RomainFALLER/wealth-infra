name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: "1.9.0"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.action || 'plan' }} (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/${{ github.event.inputs.environment || 'dev' }}.tfvars \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(-60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ github.event.inputs.environment || 'dev' }}\`\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Terraform Apply
        if: |
          github.event.inputs.action == 'apply' &&
          github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: |
          github.event.inputs.action == 'destroy' &&
          github.event_name == 'workflow_dispatch'
        run: |
          terraform destroy \
            -var-file=environments/${{ github.event.inputs.environment || 'dev' }}.tfvars \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -auto-approve
